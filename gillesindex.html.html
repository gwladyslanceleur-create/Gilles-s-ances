<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gilles · Séances de médiumnité</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1614;--ink2:#5a524e;--ink3:#9a8f8a;
  --parch:#f5f0e8;--parch2:#ede7d9;--parch3:#e0d8c8;
  --gold:#b8860b;--gold2:#d4a843;--gold3:#f0d080;
  --rose:#8b4560;--rose2:#c4758a;
  --surface:#faf7f2;--border:rgba(90,82,78,0.15);
  --shadow:0 2px 20px rgba(26,22,20,0.08);
}
body{font-family:'Jost',sans-serif;background:var(--parch);color:var(--ink);min-height:100vh;font-weight:300;}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh;}
@media(max-width:700px){.app{grid-template-columns:1fr;}}

.sidebar{background:var(--ink);color:var(--parch);padding:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-header{padding:2rem 1.5rem 1.5rem;border-bottom:0.5px solid rgba(255,255,255,0.08);}
.sidebar-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;font-style:italic;color:var(--gold2);margin-bottom:4px;}
.sidebar-sub{font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;}
.sync-pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:rgba(255,255,255,0.4);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#5DCAA5;}
.sync-dot.pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.sync-dot.offline{background:#c4758a;}
.sidebar-search{padding:1rem 1.5rem;border-bottom:0.5px solid rgba(255,255,255,0.06);}
.sidebar-search input{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:var(--parch);font-family:'Jost',sans-serif;font-size:13px;outline:none;}
.sidebar-search input::placeholder{color:rgba(255,255,255,0.3);}
.sidebar-search input:focus{border-color:var(--gold2);}
.sidebar-actions{padding:1rem 1.5rem;border-bottom:0.5px solid rgba(255,255,255,0.06);}
.btn-new{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:8px;background:var(--gold);color:var(--ink);border:none;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background 0.15s;}
.btn-new:hover{background:var(--gold2);}
.patient-list{flex:1;overflow-y:auto;padding:0.5rem 0;}
.patient-item{padding:10px 1.5rem;cursor:pointer;transition:background 0.12s;border-left:2px solid transparent;}
.patient-item:hover{background:rgba(255,255,255,0.05);}
.patient-item.active{background:rgba(184,134,11,0.15);border-left-color:var(--gold2);}
.patient-name{font-size:14px;font-weight:400;color:var(--parch);}
.patient-dob{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;}
.patient-count{font-size:11px;color:var(--gold2);margin-top:2px;}

.main{display:flex;flex-direction:column;min-height:100vh;}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center;}
.welcome-icon{font-size:48px;color:var(--gold);margin-bottom:1.5rem;opacity:0.6;}
.welcome h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;font-style:italic;color:var(--ink2);margin-bottom:0.5rem;}
.welcome p{font-size:14px;color:var(--ink3);max-width:320px;line-height:1.7;}

.patient-view{flex:1;display:flex;flex-direction:column;}
.patient-header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:1.5rem 2rem;display:flex;align-items:center;gap:1rem;}
.patient-avatar{width:52px;height:52px;border-radius:50%;background:var(--gold3);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold);flex-shrink:0;}
.patient-header-info h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;color:var(--ink);}
.patient-header-info p{font-size:12px;color:var(--ink3);margin-top:2px;}
.header-actions{margin-left:auto;display:flex;gap:8px;}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface);color:var(--ink2);font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;transition:all 0.12s;}
.btn-sm:hover{background:var(--parch2);border-color:var(--ink3);}
.btn-sm.danger{color:var(--rose);border-color:var(--rose2);}
.btn-sm.danger:hover{background:#fdf0f3;}

.tabs{background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;padding:0 2rem;}
.tab{padding:12px 16px;font-size:13px;font-weight:400;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.12s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.tab-content{flex:1;padding:2rem;overflow-y:auto;background:var(--parch);}

.sessions-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.sessions-header h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;font-style:italic;color:var(--ink2);}
.session-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:10px;cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:1rem;}
.session-card:hover{border-color:var(--gold2);box-shadow:var(--shadow);}
.session-card.active-session{border-color:var(--gold);background:#fffdf7;}
.session-date-box{background:var(--parch2);border-radius:8px;padding:8px 12px;text-align:center;min-width:52px;flex-shrink:0;}
.session-day{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;color:var(--gold);line-height:1;}
.session-month{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink3);margin-top:2px;}
.session-info{flex:1;}
.session-title{font-size:14px;font-weight:400;color:var(--ink);}
.session-meta{font-size:12px;color:var(--ink3);margin-top:3px;display:flex;gap:10px;}
.session-actions{display:flex;gap:6px;}

.session-detail{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1.5rem;}
.session-detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border);}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--ink2);display:flex;align-items:center;gap:8px;}
.field-group{margin-bottom:1.25rem;}
.field-label{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.field-input{width:100%;font-family:'Jost',sans-serif;font-size:14px;padding:10px 14px;border:0.5px solid var(--border);border-radius:8px;background:var(--parch);color:var(--ink);outline:none;transition:border-color 0.12s;font-weight:300;}
.field-input:focus{border-color:var(--gold);}
textarea.field-input{height:100px;resize:vertical;line-height:1.6;}

.audio-section{background:var(--parch2);border-radius:10px;padding:1.25rem;margin-bottom:1.25rem;}
.audio-title{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:1rem;}
.recorder{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.rec-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:20px;border:none;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;}
.rec-btn.start{background:var(--rose);color:white;}
.rec-btn.start:hover{background:var(--rose2);}
.rec-btn.stop{background:var(--ink2);color:white;}
.rec-timer{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--rose);min-width:60px;}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--rose);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.audio-list{margin-top:1rem;display:flex;flex-direction:column;gap:8px;}
.audio-item{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px;}
.audio-item audio{flex:1;height:32px;}
.audio-label{font-size:12px;color:var(--ink2);min-width:80px;}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--ink3);padding:4px;border-radius:4px;transition:color 0.12s;font-size:16px;}
.btn-icon:hover{color:var(--rose);}

.cr-section{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1.5rem;}
.cr-form{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem;}
.cr-generate-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;font-family:'Jost',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity 0.15s;}
.cr-generate-btn:hover{opacity:0.85;}
.cr-generate-btn:disabled{opacity:0.5;cursor:not-allowed;}
.cr-output{background:var(--parch);border:0.5px solid var(--border);border-radius:8px;padding:1.5rem;line-height:1.8;color:var(--ink);white-space:pre-wrap;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;}
.cr-actions{display:flex;gap:8px;margin-top:1rem;}
.btn-print{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;background:var(--ink);color:var(--parch);border:none;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;transition:background 0.12s;}
.btn-print:hover{background:var(--ink2);}

.modal-overlay{position:fixed;inset:0;background:rgba(26,22,20,0.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
.modal{background:var(--surface);border-radius:16px;padding:2rem;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;font-style:italic;margin-bottom:1.5rem;color:var(--ink);}
.modal-actions{display:flex;gap:10px;margin-top:1.5rem;justify-content:flex-end;}
.btn-cancel{padding:9px 18px;border-radius:8px;border:0.5px solid var(--border);background:none;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;color:var(--ink2);}
.btn-confirm{padding:9px 18px;border-radius:8px;border:none;background:var(--gold);color:var(--ink);font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}

.empty-state{text-align:center;padding:3rem;color:var(--ink3);}
.empty-state i{font-size:32px;display:block;margin-bottom:10px;opacity:0.4;}
.loading-full{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--ink3);gap:10px;font-size:14px;}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(26,22,20,0.2);border-top-color:var(--ink);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important;}

@media print{
  .sidebar,.tabs,.header-actions,.session-actions,.audio-section,.cr-form,.cr-actions,.sessions-header .btn-sm{display:none!important;}
  .app{display:block;}
  body{background:white;}
  .session-detail,.cr-section{border:none;box-shadow:none;}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Gilles</div>
      <div class="sidebar-sub">Séances de médiumnité</div>
      <div class="sync-pill">
        <div class="sync-dot pulse" id="sync-dot"></div>
        <span id="sync-label">Connexion…</span>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Rechercher un consultant…" oninput="renderPatientList()"/>
    </div>
    <div class="sidebar-actions">
      <button class="btn-new" onclick="openNewPatientModal()"><i class="ti ti-user-plus"></i> Nouveau consultant</button>
    </div>
    <div class="patient-list" id="patient-list">
      <div class="loading-full"><span class="spinner"></span></div>
    </div>
  </aside>
  <main class="main" id="main-area">
    <div class="welcome">
      <i class="ti ti-sparkles welcome-icon"></i>
      <h2>Bienvenue, Gilles</h2>
      <p>Sélectionnez un consultant ou créez-en un nouveau.</p>
    </div>
  </main>
</div>

<!-- Modals -->
<div class="modal-overlay hidden" id="patient-modal">
  <div class="modal">
    <h3>Nouveau consultant</h3>
    <div class="field-group"><div class="field-label">Prénom</div><input type="text" class="field-input" id="new-firstname" placeholder="Prénom"/></div>
    <div class="field-group"><div class="field-label">Nom</div><input type="text" class="field-input" id="new-lastname" placeholder="Nom"/></div>
    <div class="field-group"><div class="field-label">Date de naissance</div><input type="date" class="field-input" id="new-dob"/></div>
    <div class="field-group"><div class="field-label">Notes</div><textarea class="field-input" id="new-notes" placeholder="Informations complémentaires…"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="saveNewPatient()">Créer</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="session-modal">
  <div class="modal">
    <h3>Nouvelle séance</h3>
    <div class="field-group"><div class="field-label">Date</div><input type="date" class="field-input" id="new-session-date"/></div>
    <div class="field-group"><div class="field-label">Notes rapides (optionnel)</div><textarea class="field-input" id="new-session-notes" placeholder="Premier ressenti, contexte…"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="saveNewSession()">Créer la séance</button>
    </div>
  </div>
</div>

<script>
// ── Firebase REST ──────────────────────────────────────────────────────────
const FB = "https://conference-dethiollaz-default-rtdb.europe-west1.firebasedatabase.app/gilles";

async function fbGet(path){
  const r = await fetch(`${FB}/${path}.json`);
  if(!r.ok) throw new Error('Firebase GET failed');
  return r.json();
}
async function fbSet(path, data){
  const r = await fetch(`${FB}/${path}.json`, {method:'PUT', body:JSON.stringify(data)});
  if(!r.ok) throw new Error('Firebase SET failed');
  return r.json();
}
async function fbPatch(path, data){
  const r = await fetch(`${FB}/${path}.json`, {method:'PATCH', body:JSON.stringify(data)});
  if(!r.ok) throw new Error('Firebase PATCH failed');
  return r.json();
}
async function fbDelete(path){
  await fetch(`${FB}/${path}.json`, {method:'DELETE'});
}
async function fbPush(path, data){
  const r = await fetch(`${FB}/${path}.json`, {method:'POST', body:JSON.stringify(data)});
  if(!r.ok) throw new Error('Firebase PUSH failed');
  return r.json();
}

// ── State ──────────────────────────────────────────────────────────────────
let patients = {};
let sessions = {};
let currentPatientId = null;
let currentSessionId = null;
let currentTab = 'sessions';
let mediaRecorder = null;
let recChunks = [];
let recTimer = null;
let recSeconds = 0;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── Sync status ────────────────────────────────────────────────────────────
function setSynced(msg){
  document.getElementById('sync-dot').className='sync-dot pulse';
  document.getElementById('sync-label').textContent = msg||'Synchronisé';
}
function setOffline(){
  document.getElementById('sync-dot').className='sync-dot offline';
  document.getElementById('sync-label').textContent='Hors ligne';
}

// ── Load all data ──────────────────────────────────────────────────────────
async function loadAll(){
  try {
    const data = await fbGet('');
    patients = data?.patients || {};
    sessions = data?.sessions || {};
    setSynced('Synchronisé');
    renderPatientList();
  } catch(e){
    setOffline();
    renderPatientList();
  }
}

// ── Patient list ───────────────────────────────────────────────────────────
function renderPatientList(){
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('patient-list');
  const pts = Object.values(patients)
    .filter(p=>(p.firstname+' '+p.lastname).toLowerCase().includes(q))
    .sort((a,b)=>a.firstname.localeCompare(b.firstname));

  if(!pts.length){
    list.innerHTML='<div style="padding:1.5rem;font-size:12px;color:rgba(255,255,255,0.25);text-align:center;">Aucun consultant</div>';
    return;
  }
  list.innerHTML = pts.map(p=>{
    const cnt = Object.values(sessions).filter(s=>s.patientId===p.id).length;
    const dob = p.dob ? new Date(p.dob+'T12:00:00').toLocaleDateString('fr-FR') : '';
    return `<div class="patient-item${p.id===currentPatientId?' active':''}" onclick="selectPatient('${p.id}')">
      <div class="patient-name">${p.firstname} ${p.lastname}</div>
      ${dob?`<div class="patient-dob">${dob}</div>`:''}
      <div class="patient-count">${cnt} séance${cnt>1?'s':''}</div>
    </div>`;
  }).join('');
}

function selectPatient(id){
  currentPatientId=id; currentSessionId=null; currentTab='sessions';
  renderPatientList(); renderPatientView();
}

function openNewPatientModal(){
  ['new-firstname','new-lastname','new-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('new-dob').value='';
  document.getElementById('patient-modal').classList.remove('hidden');
}

async function saveNewPatient(){
  const fn=document.getElementById('new-firstname').value.trim();
  if(!fn){ alert('Prénom requis'); return; }
  const p={id:uid(),firstname:fn,lastname:document.getElementById('new-lastname').value.trim(),dob:document.getElementById('new-dob').value,notes:document.getElementById('new-notes').value,createdAt:Date.now()};
  patients[p.id]=p;
  closeModal();
  renderPatientList();
  selectPatient(p.id);
  try{ await fbSet(`patients/${p.id}`,p); setSynced('Enregistré'); }catch(e){ setOffline(); }
}

async function deletePatient(id){
  if(!confirm('Supprimer ce consultant et toutes ses séances ?')) return;
  delete patients[id];
  Object.keys(sessions).forEach(k=>{ if(sessions[k].patientId===id) delete sessions[k]; });
  currentPatientId=null; currentSessionId=null;
  renderPatientList();
  document.getElementById('main-area').innerHTML=`<div class="welcome"><i class="ti ti-sparkles welcome-icon"></i><h2>Bienvenue, Gilles</h2><p>Sélectionnez un consultant.</p></div>`;
  try{ await fbDelete(`patients/${id}`); await fbDelete(`sessions`); await fbSet('sessions', sessions); setSynced('Supprimé'); }catch(e){ setOffline(); }
}

// ── Sessions ───────────────────────────────────────────────────────────────
function openNewSessionModal(){
  document.getElementById('new-session-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('new-session-notes').value='';
  document.getElementById('session-modal').classList.remove('hidden');
}

async function saveNewSession(){
  const d=document.getElementById('new-session-date').value;
  if(!d){ alert('Date requise'); return; }
  const s={id:uid(),patientId:currentPatientId,date:d,notes:document.getElementById('new-session-notes').value,motif:'',ambiance:'',personnes:'',messages:'',questionsReponses:'',autres:'',audios:[],cr:'',createdAt:Date.now()};
  sessions[s.id]=s;
  closeModal();
  currentSessionId=s.id; currentTab='detail';
  renderPatientList(); renderPatientView();
  try{ await fbSet(`sessions/${s.id}`,s); setSynced('Séance créée'); }catch(e){ setOffline(); }
}

async function deleteSession(id){
  if(!confirm('Supprimer cette séance ?')) return;
  delete sessions[id];
  currentSessionId=null; currentTab='sessions';
  try{ await fbDelete(`sessions/${id}`); setSynced('Supprimé'); }catch(e){ setOffline(); }
  renderPatientList(); renderPatientView();
}

function closeModal(){
  document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.add('hidden'));
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderPatientView(){
  const p=patients[currentPatientId]; if(!p) return;
  const sess=Object.values(sessions).filter(s=>s.patientId===p.id).sort((a,b)=>b.date.localeCompare(a.date));
  const dob=p.dob?new Date(p.dob+'T12:00:00').toLocaleDateString('fr-FR'):'Non renseignée';
  const age=p.dob?Math.floor((Date.now()-new Date(p.dob+'T12:00:00'))/(365.25*24*3600*1000))+' ans':'';
  document.getElementById('main-area').innerHTML=`
    <div class="patient-view">
      <div class="patient-header">
        <div class="patient-avatar">${p.firstname[0]}${p.lastname?p.lastname[0]:''}</div>
        <div class="patient-header-info">
          <h2>${p.firstname} ${p.lastname}</h2>
          <p>${dob}${age?' · '+age:''} · ${sess.length} séance${sess.length>1?'s':''}</p>
        </div>
        <div class="header-actions">
          <button class="btn-sm danger" onclick="deletePatient('${p.id}')"><i class="ti ti-trash"></i> Supprimer</button>
        </div>
      </div>
      <div class="tabs">
        <div class="tab${currentTab==='sessions'?' active':''}" onclick="switchTab('sessions')"><i class="ti ti-calendar"></i> Séances</div>
        <div class="tab${currentTab==='detail'?' active':''}" onclick="switchTab('detail')"><i class="ti ti-file-text"></i> Détail</div>
        <div class="tab${currentTab==='cr'?' active':''}" onclick="switchTab('cr')"><i class="ti ti-sparkles"></i> Compte rendu</div>
      </div>
      <div class="tab-content" id="tab-content">
        ${currentTab==='sessions'?renderSessionsList(sess):''}
        ${currentTab==='detail'&&currentSessionId?renderSessionDetail():currentTab==='detail'?'<div class="empty-state"><i class="ti ti-arrow-left"></i>Sélectionnez une séance</div>':''}
        ${currentTab==='cr'&&currentSessionId?renderCR():currentTab==='cr'?'<div class="empty-state"><i class="ti ti-arrow-left"></i>Sélectionnez une séance</div>':''}
      </div>
    </div>`;
}

function switchTab(tab){ currentTab=tab; renderPatientView(); }

function renderSessionsList(sess){
  const p=patients[currentPatientId];
  if(!sess.length) return `
    <div class="sessions-header"><h3>Historique des séances</h3><button class="btn-sm" onclick="openNewSessionModal()"><i class="ti ti-plus"></i> Nouvelle séance</button></div>
    <div class="empty-state"><i class="ti ti-calendar-off"></i>Aucune séance pour ${p.firstname}</div>`;
  return `
    <div class="sessions-header"><h3>Historique · ${sess.length} séance${sess.length>1?'s':''}</h3><button class="btn-sm" onclick="openNewSessionModal()"><i class="ti ti-plus"></i> Nouvelle séance</button></div>
    ${sess.map(s=>{
      const d=new Date(s.date+'T12:00:00');
      return `<div class="session-card${s.id===currentSessionId?' active-session':''}" onclick="openSession('${s.id}')">
        <div class="session-date-box">
          <div class="session-day">${d.getDate()}</div>
          <div class="session-month">${d.toLocaleDateString('fr-FR',{month:'short'})}</div>
        </div>
        <div class="session-info">
          <div class="session-title">${d.toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
          <div class="session-meta">
            ${s.audios&&s.audios.length?`<span><i class="ti ti-microphone" style="font-size:12px;"></i>${s.audios.length} audio</span>`:''}
            ${s.cr?`<span><i class="ti ti-check" style="font-size:12px;color:var(--gold);"></i>CR généré</span>`:''}
            ${s.motif?`<span>${s.motif.slice(0,45)}…</span>`:''}
          </div>
        </div>
        <div class="session-actions">
          <button class="btn-sm" onclick="event.stopPropagation();openSession('${s.id}');switchTab('cr')"><i class="ti ti-sparkles"></i></button>
          <button class="btn-sm danger" onclick="event.stopPropagation();deleteSession('${s.id}')"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;
    }).join('')}`;
}

function openSession(id){ currentSessionId=id; currentTab='detail'; renderPatientView(); }

function renderSessionDetail(){
  const s=sessions[currentSessionId]; if(!s) return '';
  const d=new Date(s.date+'T12:00:00');
  return `
    <div class="session-detail">
      <div class="session-detail-header">
        <div class="section-title"><i class="ti ti-calendar" style="font-size:16px;"></i>${d.toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
        <button class="btn-sm" onclick="saveSessionDetail()"><i class="ti ti-device-floppy"></i> Enregistrer</button>
      </div>
      <div class="field-group"><div class="field-label">Motif de consultation</div><textarea class="field-input" id="f-motif" placeholder="Ce qui a amené la personne à consulter…">${s.motif||''}</textarea></div>
      <div class="field-group"><div class="field-label">Ambiance de la séance</div><textarea class="field-input" id="f-ambiance" placeholder="Énergie, atmosphère, ressentis généraux…">${s.ambiance||''}</textarea></div>
      <div class="field-group"><div class="field-label">Personnes / entités présentes</div><textarea class="field-input" id="f-personnes" placeholder="Qui s'est manifesté, comment…">${s.personnes||''}</textarea></div>
      <div class="field-group"><div class="field-label">Messages donnés</div><textarea class="field-input" id="f-messages" placeholder="Messages reçus et transmis…" style="height:120px;">${s.messages||''}</textarea></div>
      <div class="field-group"><div class="field-label">Questions & réponses</div><textarea class="field-input" id="f-qr" placeholder="Q : … R : …" style="height:120px;">${s.questionsReponses||''}</textarea></div>
      <div class="field-group"><div class="field-label">Observations complémentaires</div><textarea class="field-input" id="f-autres" placeholder="Symboles, impressions, éléments notables…">${s.autres||''}</textarea></div>
      <div class="audio-section">
        <div class="audio-title"><i class="ti ti-microphone" style="font-size:13px;margin-right:6px;"></i>Enregistrements audio</div>
        <div class="recorder">
          <button class="rec-btn start" id="rec-start-btn" onclick="startRecording()"><i class="ti ti-circle-dot"></i> Enregistrer</button>
          <button class="rec-btn stop hidden" id="rec-stop-btn" onclick="stopRecording()"><i class="ti ti-square"></i> Arrêter</button>
          <span class="rec-timer hidden" id="rec-timer">0:00</span>
          <span class="rec-dot hidden" id="rec-dot"></span>
        </div>
        <div class="audio-list" id="audio-list">${renderAudioList()}</div>
      </div>
      <div style="text-align:right;"><button class="btn-sm" onclick="saveSessionDetail()"><i class="ti ti-device-floppy"></i> Enregistrer les notes</button></div>
    </div>`;
}

async function saveSessionDetail(){
  const s=sessions[currentSessionId]; if(!s) return;
  s.motif=document.getElementById('f-motif')?.value||s.motif;
  s.ambiance=document.getElementById('f-ambiance')?.value||s.ambiance;
  s.personnes=document.getElementById('f-personnes')?.value||s.personnes;
  s.messages=document.getElementById('f-messages')?.value||s.messages;
  s.questionsReponses=document.getElementById('f-qr')?.value||s.questionsReponses;
  s.autres=document.getElementById('f-autres')?.value||s.autres;
  try{
    // On exclut les audios (trop lourds pour Firebase REST, stockés en base64 localement)
    const {audios,...toSave}=s;
    await fbSet(`sessions/${s.id}`,{...toSave,audioCount:audios?audios.length:0});
    setSynced('Notes enregistrées');
  }catch(e){ setOffline(); }
  // Audios: localStorage uniquement (fichiers binaires)
  localStorage.setItem('audios_'+s.id, JSON.stringify(s.audios||[]));
  const btn=document.querySelector('.session-detail .btn-sm:last-child');
  if(btn){ const o=btn.innerHTML; btn.innerHTML='<i class="ti ti-check"></i> Enregistré'; setTimeout(()=>btn.innerHTML=o,1500); }
}

// ── Audio (localStorage pour les binaires) ─────────────────────────────────
function getAudios(sid){ try{ return JSON.parse(localStorage.getItem('audios_'+sid)||'[]'); }catch(e){ return []; } }

function renderAudioList(){
  const s=sessions[currentSessionId]; if(!s) return '';
  const audios=getAudios(s.id);
  if(!audios.length) return '<div style="font-size:12px;color:var(--ink3);padding:4px 0;">Aucun enregistrement</div>';
  return audios.map((a,i)=>`
    <div class="audio-item">
      <span class="audio-label"><i class="ti ti-microphone" style="font-size:12px;margin-right:4px;"></i>Audio ${i+1}</span>
      <audio controls src="${a.url}"></audio>
      <button class="btn-icon" onclick="deleteAudio(${i})"><i class="ti ti-trash"></i></button>
    </div>`).join('');
}

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);
    recChunks=[];
    mediaRecorder.ondataavailable=e=>recChunks.push(e.data);
    mediaRecorder.onstop=()=>{
      const blob=new Blob(recChunks,{type:'audio/webm'});
      const url=URL.createObjectURL(blob);
      const s=sessions[currentSessionId];
      const audios=getAudios(s.id);
      audios.push({url,ts:Date.now()});
      localStorage.setItem('audios_'+s.id,JSON.stringify(audios));
      stream.getTracks().forEach(t=>t.stop());
      clearInterval(recTimer); recSeconds=0;
      document.getElementById('rec-start-btn').classList.remove('hidden');
      document.getElementById('rec-stop-btn').classList.add('hidden');
      document.getElementById('rec-timer').classList.add('hidden');
      document.getElementById('rec-dot').classList.add('hidden');
      document.getElementById('audio-list').innerHTML=renderAudioList();
    };
    mediaRecorder.start();
    recSeconds=0;
    document.getElementById('rec-start-btn').classList.add('hidden');
    document.getElementById('rec-stop-btn').classList.remove('hidden');
    document.getElementById('rec-timer').classList.remove('hidden');
    document.getElementById('rec-dot').classList.remove('hidden');
    recTimer=setInterval(()=>{ recSeconds++; const m=Math.floor(recSeconds/60),sec=recSeconds%60; document.getElementById('rec-timer').textContent=`${m}:${String(sec).padStart(2,'0')}`; },1000);
  }catch(e){ alert('Accès au microphone refusé ou indisponible.'); }
}
function stopRecording(){ if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop(); }
function deleteAudio(i){
  if(!confirm('Supprimer cet enregistrement ?')) return;
  const s=sessions[currentSessionId];
  const audios=getAudios(s.id); audios.splice(i,1);
  localStorage.setItem('audios_'+s.id,JSON.stringify(audios));
  document.getElementById('audio-list').innerHTML=renderAudioList();
}

// ── Compte rendu ───────────────────────────────────────────────────────────
function renderCR(){
  const s=sessions[currentSessionId]; if(!s) return '';
  const d=new Date(s.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  return `
    <div class="cr-section">
      <div class="section-title" style="margin-bottom:1.5rem;"><i class="ti ti-sparkles" style="font-size:16px;color:var(--gold);"></i>Compte rendu · ${d}</div>
      <div class="cr-form">
        <div style="background:var(--parch2);border-radius:8px;padding:1rem;font-size:13px;color:var(--ink2);line-height:1.6;">
          <strong style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);">Données disponibles</strong><br/>
          ${[s.motif&&'✓ Motif',s.ambiance&&'✓ Ambiance',s.personnes&&'✓ Personnes',s.messages&&'✓ Messages',s.questionsReponses&&'✓ Q&R',s.autres&&'✓ Observations'].filter(Boolean).join(' · ')||'<span style="color:var(--rose2);">Aucune note — remplissez d\'abord l\'onglet Détail.</span>'}
        </div>
        <button class="cr-generate-btn" id="gen-btn" onclick="generateCR()"><i class="ti ti-sparkles"></i> Générer le compte rendu avec Claude</button>
      </div>
      <div id="cr-output-area">
        ${s.cr?`<div class="cr-output">${s.cr}</div><div class="cr-actions">
          <button class="btn-print" onclick="printCR()"><i class="ti ti-printer"></i> Imprimer</button>
          <button class="btn-sm" onclick="copyCR()"><i class="ti ti-copy"></i> Copier</button>
          <button class="btn-sm" onclick="generateCR()"><i class="ti ti-refresh"></i> Régénérer</button>
        </div>`:'<div style="font-size:13px;color:var(--ink3);padding:1rem 0;">Cliquez sur le bouton pour générer le compte rendu.</div>'}
      </div>
    </div>`;
}

async function generateCR(){
  const s=sessions[currentSessionId];
  const p=patients[currentPatientId];
  const d=new Date(s.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const btn=document.getElementById('gen-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Génération en cours…';
  document.getElementById('cr-output-area').innerHTML='<div class="loading-full"><span class="spinner"></span> Claude rédige le compte rendu…</div>';

  const prompt=`Tu es l'assistant de Gilles, médium. Rédige un compte rendu de séance de médiumnité professionnel, chaleureux et précis, en français, à la troisième personne (en parlant de "le consultant" ou "${p.firstname}").

Consultant : ${p.firstname} ${p.lastname}${p.dob?' · né·e le '+new Date(p.dob+'T12:00:00').toLocaleDateString('fr-FR'):''}
Date de la séance : ${d}

Notes de Gilles :
- Motif : ${s.motif||'Non renseigné'}
- Ambiance : ${s.ambiance||'Non renseignée'}
- Personnes / entités présentes : ${s.personnes||'Non renseignées'}
- Messages donnés : ${s.messages||'Non renseignés'}
- Questions & réponses : ${s.questionsReponses||'Non renseignées'}
- Observations : ${s.autres||'Aucune'}

Rédige un compte rendu structuré avec ces sections (titres en majuscules) :
CONTEXTE ET MOTIF
DÉROULEMENT DE LA SÉANCE
CONTACTS ET MESSAGES
ÉCHANGES ET RÉPONSES
SYNTHÈSE ET OBSERVATIONS

Ton doit être respectueux, discret, précis. Style fluide et narratif, pas de liste à puces. Environ 400-600 mots.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.map(c=>c.text||'').join('')||'Erreur de génération.';
    s.cr=text;
    // Sauvegarder le CR dans Firebase
    try{ const {audios,...toSave}=s; await fbSet(`sessions/${s.id}`,{...toSave,audioCount:s.audios?.length||0}); setSynced('CR enregistré'); }catch(e){ setOffline(); }
    document.getElementById('cr-output-area').innerHTML=`
      <div class="cr-output">${text}</div>
      <div class="cr-actions">
        <button class="btn-print" onclick="printCR()"><i class="ti ti-printer"></i> Imprimer</button>
        <button class="btn-sm" onclick="copyCR()"><i class="ti ti-copy"></i> Copier</button>
        <button class="btn-sm" onclick="generateCR()"><i class="ti ti-refresh"></i> Régénérer</button>
      </div>`;
  }catch(e){
    document.getElementById('cr-output-area').innerHTML='<div style="color:var(--rose);font-size:13px;padding:1rem 0;">Erreur réseau. Vérifiez votre connexion.</div>';
  }
  btn.disabled=false; btn.innerHTML='<i class="ti ti-sparkles"></i> Générer le compte rendu avec Claude';
}

function printCR(){
  const s=sessions[currentSessionId]; const p=patients[currentPatientId];
  const d=new Date(s.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <title>CR · ${p.firstname} ${p.lastname} · ${d}</title>
    <style>body{font-family:'Jost',sans-serif;font-weight:300;max-width:680px;margin:3rem auto;color:#1a1614;line-height:1.8;}
    h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-style:italic;font-weight:400;color:#b8860b;margin-bottom:0.3rem;}
    .meta{font-size:13px;color:#9a8f8a;margin-bottom:2rem;padding-bottom:1rem;border-bottom:0.5px solid #e0d8c8;}
    .cr{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;white-space:pre-wrap;}
    @media print{body{margin:2cm;}}</style></head><body>
    <h1>Compte rendu de séance</h1>
    <div class="meta">${p.firstname} ${p.lastname} · ${d}</div>
    <div class="cr">${s.cr||''}</div>
    <script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

function copyCR(){
  const s=sessions[currentSessionId];
  navigator.clipboard.writeText(s.cr||'').then(()=>{
    const btn=document.querySelector('.cr-actions .btn-sm');
    const o=btn.innerHTML; btn.innerHTML='<i class="ti ti-check"></i> Copié !';
    setTimeout(()=>btn.innerHTML=o,1500);
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
loadAll();
// Resync toutes les 30s si Gilles utilise sur plusieurs appareils
setInterval(async()=>{
  try{
    const data=await fbGet('');
    patients=data?.patients||{};
    sessions=data?.sessions||{};
    setSynced(new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
    renderPatientList();
  }catch(e){ setOffline(); }
}, 30000);
</script>
</body>
</html>
